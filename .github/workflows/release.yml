name: Release Charts

on:
  push:
    branches:
      - main

jobs:
  release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Package chart
        run: |
          helm package charts/gen -d .cr-release-packages

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="gen-$(helm show chart charts/gen | grep '^version:' | awk '{print $2}')"
          if gh release view "$TAG" &>/dev/null; then
            echo "Release $TAG already exists — skipping"
            exit 0
          fi
          gh release create "$TAG" .cr-release-packages/*.tgz \
            --title "$TAG" \
            --generate-notes

      - name: Update GitHub Pages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          CHART_VERSION=$(helm show chart charts/gen | grep '^version:' | awk '{print $2}')
          TAG="gen-${CHART_VERSION}"
          OWNER="${GITHUB_REPOSITORY%/*}"
          REPO="${GITHUB_REPOSITORY#*/}"
          AUTH_URL="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          INDEX_URL="https://${OWNER}.github.io/${REPO}"

          # Stage packages in a temp directory
            PKG_DIR="$(mktemp -d)"
            cp .cr-release-packages/*.tgz "$PKG_DIR/"

          # Try to clone existing gh-pages branch
          if git ls-remote --exit-code --heads origin gh-pages &>/dev/null; then
            cd "$PKG_DIR"
            git clone --branch gh-pages --single-branch "$AUTH_URL" repo
            mv *.tgz repo/
            cd repo
            helm repo index . --url "$INDEX_URL" --merge index.yaml 2>/dev/null || helm repo index . --url "$INDEX_URL"
          else
            cd "$PKG_DIR"
            helm repo index . --url "$INDEX_URL"
            git init
            git checkout -b gh-pages
            git remote add origin "$AUTH_URL"
          fi

          git add -A
          if git diff --cached --quiet; then
            echo "No index changes — nothing to commit"
            exit 0
          fi
          git commit -m "Release ${TAG}"
          git push origin gh-pages
          echo "Published ${TAG} to GitHub Pages"
