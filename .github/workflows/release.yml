name: Release Charts

on:
  push:
    branches:
      - main

jobs:
  release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Package chart
        run: |
          helm package charts/gen -d .cr-release-packages

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="gen-$(helm show chart charts/gen | grep '^version:' | awk '{print $2}')"
          if gh release view "$TAG" &>/dev/null; then
            echo "Release $TAG already exists — skipping"
            exit 0
          fi
          gh release create "$TAG" .cr-release-packages/*.tgz \
            --title "$TAG" \
            --generate-notes

      - name: Build Helm repo index
        run: |
          set -euo pipefail
          OWNER="${GITHUB_REPOSITORY%/*}"
          REPO="${GITHUB_REPOSITORY#*/}"
          INDEX_URL="https://${OWNER}.github.io/${REPO}"

          mkdir -p pages

          # Collect all .tgz files — both existing (from gh-pages) and new
          if git clone --branch gh-pages --single-branch "https://github.com/${GITHUB_REPOSITORY}.git" pages-existing 2>/dev/null; then
            cp pages-existing/*.tgz pages/ 2>/dev/null || true
            rm -rf pages-existing
          fi
          cp .cr-release-packages/*.tgz pages/

          # Build index, merging with existing if present
          if [ -f pages/index.yaml ]; then
            helm repo index pages/ --url "$INDEX_URL" --merge pages/index.yaml
          else
            helm repo index pages/ --url "$INDEX_URL"
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./pages
          publish_branch: gh-pages
          force_orphan: false
