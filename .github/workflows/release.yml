name: Release Helm Chart

on:
  push:
    branches: [main]
    paths: [gen/**]

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: helm/chart-releaser-action@v1
        with:
          charts_dir: gen
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
